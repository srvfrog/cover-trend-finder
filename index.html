<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커버곡 트렌드 파인더</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap');

:root {
–bg: #0d0d0d;
–surface: #161616;
–border: #2a2a2a;
–accent: #c8a97e;
–accent2: #7ec8a9;
–text: #e8e0d5;
–muted: #666;
–danger: #c87e7e;
–hot: #e8a44a;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Noto Serif KR’, serif;
min-height: 100vh;
padding: 2rem 1rem;
}

.container { max-width: 720px; margin: 0 auto; }

header {
text-align: center;
margin-bottom: 2rem;
padding-bottom: 2rem;
border-bottom: 1px solid var(–border);
}

header h1 {
font-size: 1.6rem;
font-weight: 300;
letter-spacing: 0.1em;
color: var(–accent);
margin-bottom: 0.4rem;
}

header p {
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: var(–muted);
letter-spacing: 0.05em;
}

.api-section {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 4px;
padding: 1.5rem;
margin-bottom: 1.5rem;
}

.api-section label {
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: var(–muted);
letter-spacing: 0.1em;
display: block;
margin-bottom: 0.6rem;
}

.api-input-row { display: flex; gap: 0.5rem; }

input[type=“text”] {
flex: 1;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 3px;
color: var(–text);
font-family: ‘Space Mono’, monospace;
font-size: 0.75rem;
padding: 0.6rem 0.8rem;
outline: none;
transition: border-color 0.2s;
}

input[type=“text”]:focus { border-color: var(–accent); }

.btn {
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
letter-spacing: 0.08em;
border: none;
border-radius: 3px;
cursor: pointer;
padding: 0.6rem 1rem;
transition: all 0.2s;
}

.btn-save { background: var(–border); color: var(–muted); }
.btn-save:hover { background: #333; color: var(–text); }
.btn-save.saved { background: var(–accent2); color: var(–bg); }

.api-guide {
margin-top: 0.8rem;
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
color: var(–muted);
line-height: 1.8;
}

.api-guide a { color: var(–accent); text-decoration: none; }

.regions {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 0.5rem;
margin-bottom: 1.5rem;
}

.region-btn {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 3px;
color: var(–muted);
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
letter-spacing: 0.05em;
padding: 0.6rem;
cursor: pointer;
transition: all 0.2s;
text-align: center;
}

.region-btn:hover { border-color: var(–accent); color: var(–text); }
.region-btn.active { border-color: var(–accent); color: var(–accent); background: rgba(200,169,126,0.08); }

.search-btn {
width: 100%;
background: var(–accent);
color: var(–bg);
font-size: 0.8rem;
padding: 0.9rem;
margin-bottom: 1.5rem;
letter-spacing: 0.15em;
}

.search-btn:hover { background: #d4b88a; }
.search-btn:disabled { background: var(–border); color: var(–muted); cursor: not-allowed; }

.history-section { margin-bottom: 2rem; }

.history-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 0.8rem;
}

.history-title {
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
color: var(–muted);
letter-spacing: 0.1em;
}

.btn-clear-history {
background: transparent;
border: 1px solid var(–border);
color: var(–muted);
font-size: 0.6rem;
padding: 0.3rem 0.6rem;
}

.btn-clear-history:hover { border-color: var(–danger); color: var(–danger); }

.snapshot-list {
display: flex;
gap: 0.4rem;
flex-wrap: wrap;
}

.snapshot-chip {
font-family: ‘Space Mono’, monospace;
font-size: 0.6rem;
padding: 0.3rem 0.7rem;
border-radius: 2px;
border: 1px solid var(–border);
color: var(–muted);
cursor: pointer;
transition: all 0.2s;
background: var(–surface);
}

.snapshot-chip:hover { border-color: var(–accent); color: var(–accent); }
.snapshot-chip.active { border-color: var(–accent); color: var(–accent); background: rgba(200,169,126,0.1); }

.no-history {
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
color: var(–muted);
}

.loading {
text-align: center;
padding: 3rem;
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: var(–muted);
display: none;
}

.loading.active { display: block; }

.loading-dot {
display: inline-block;
animation: pulse 1.4s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
0%, 80%, 100% { opacity: 0.2; }
40% { opacity: 1; }
}

.results { display: none; }
.results.active { display: block; }

.results-meta {
font-family: ‘Space Mono’, monospace;
font-size: 0.6rem;
color: var(–muted);
margin-bottom: 1.5rem;
padding-bottom: 0.8rem;
border-bottom: 1px solid var(–border);
}

.region-result { margin-bottom: 2.5rem; }

.region-header {
display: flex;
align-items: center;
gap: 1rem;
margin-bottom: 1rem;
padding-bottom: 0.5rem;
border-bottom: 1px solid var(–border);
}

.region-flag { font-size: 1.2rem; }

.region-name {
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: var(–accent);
letter-spacing: 0.1em;
flex: 1;
}

.song-list { list-style: none; }

.song-item {
display: flex;
align-items: flex-start;
gap: 1rem;
padding: 0.9rem 0;
border-bottom: 1px solid #1a1a1a;
animation: fadeIn 0.4s ease forwards;
opacity: 0;
}

@keyframes fadeIn { to { opacity: 1; } }

.song-rank {
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
color: var(–muted);
min-width: 1.5rem;
padding-top: 0.15rem;
}

.song-info { flex: 1; min-width: 0; }

.song-title {
font-size: 0.9rem;
font-weight: 400;
margin-bottom: 0.2rem;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.song-channel {
font-family: ‘Space Mono’, monospace;
font-size: 0.6rem;
color: var(–muted);
}

.song-tags {
display: flex;
gap: 0.3rem;
margin-top: 0.4rem;
flex-wrap: wrap;
}

.tag {
font-family: ‘Space Mono’, monospace;
font-size: 0.55rem;
padding: 0.15rem 0.4rem;
border-radius: 2px;
letter-spacing: 0.05em;
}

.tag-cover { background: rgba(200,169,126,0.15); color: var(–accent); }
.tag-music { background: rgba(126,200,169,0.15); color: var(–accent2); }
.tag-trending { background: rgba(200,126,126,0.15); color: var(–danger); }
.tag-hot { background: rgba(232,164,74,0.2); color: var(–hot); }

.song-right {
display: flex;
flex-direction: column;
align-items: flex-end;
gap: 0.3rem;
min-width: 4rem;
}

.cover-score {
font-family: ‘Space Mono’, monospace;
font-size: 0.6rem;
color: var(–accent2);
text-align: right;
}

.streak-badge {
font-family: ‘Space Mono’, monospace;
font-size: 0.55rem;
color: var(–hot);
text-align: right;
}

.error-msg {
background: rgba(200,126,126,0.1);
border: 1px solid rgba(200,126,126,0.3);
border-radius: 3px;
padding: 1rem;
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: var(–danger);
display: none;
line-height: 1.7;
margin-bottom: 1rem;
white-space: pre-wrap;
}

.error-msg.active { display: block; }

.filter-tabs {
display: flex;
gap: 0.4rem;
margin-bottom: 1.5rem;
}

.filter-tab {
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
letter-spacing: 0.08em;
padding: 0.5rem 1rem;
border-radius: 3px;
border: 1px solid var(–border);
background: var(–surface);
color: var(–muted);
cursor: pointer;
transition: all 0.2s;
}

.filter-tab:hover { border-color: var(–accent); color: var(–text); }
.filter-tab.active { border-color: var(–accent); color: var(–accent); background: rgba(200,169,126,0.08); }

.empty-filter {
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
color: var(–muted);
text-align: center;
padding: 2rem 0;
}

footer {
text-align: center;
margin-top: 3rem;
padding-top: 1.5rem;
border-top: 1px solid var(–border);
font-family: ‘Space Mono’, monospace;
font-size: 0.6rem;
color: var(–muted);
}
</style>

</head>
<body>
<div class="container">

  <header>
    <h1>커버곡 트렌드 파인더</h1>
    <p>YouTube 급상승 음악 기준 · 지역별 커버 후보 추출</p>
  </header>

  <div class="api-section">
    <label>YOUTUBE DATA API KEY</label>
    <div class="api-input-row">
      <input type="text" id="apiKey" placeholder="AIza..." />
      <button class="btn btn-save" id="saveBtn" onclick="saveKey()">저장</button>
    </div>
    <div class="api-guide">
      발급: <a href="https://console.cloud.google.com/" target="_blank">console.cloud.google.com</a>
      → 프로젝트 생성 → YouTube Data API v3 활성화 → 사용자 인증 정보 → API 키 생성
    </div>
  </div>

  <div class="regions">
    <button class="region-btn active" data-code="KR" data-flag="🇰🇷" data-name="한국" onclick="toggleRegion(this)">🇰🇷 한국</button>
    <button class="region-btn active" data-code="JP" data-flag="🇯🇵" data-name="일본" onclick="toggleRegion(this)">🇯🇵 일본</button>
    <button class="region-btn active" data-code="TW" data-flag="🇹🇼" data-name="대만" onclick="toggleRegion(this)">🇹🇼 대만</button>
    <button class="region-btn active" data-code="HK" data-flag="🇭🇰" data-name="홍콩" onclick="toggleRegion(this)">🇭🇰 홍콩</button>
    <button class="region-btn active" data-code="US" data-flag="🇺🇸" data-name="미국" onclick="toggleRegion(this)">🇺🇸 미국</button>
    <button class="region-btn active" data-code="GB" data-flag="🇬🇧" data-name="영국" onclick="toggleRegion(this)">🇬🇧 영국</button>
  </div>

<button class="btn search-btn" onclick="fetchTrends()">▶ 지금 트렌드 불러오기</button>

  <div class="history-section">
    <div class="history-header">
      <span class="history-title">SNAPSHOT HISTORY</span>
      <button class="btn btn-clear-history" onclick="clearHistory()">전체 삭제</button>
    </div>
    <div class="snapshot-list" id="snapshotList">
      <span class="no-history">아직 저장된 스냅샷이 없습니다</span>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="filter-tabs" id="filterTabs" style="display:none">
    <button class="filter-tab active" onclick="setFilter('all')">전체</button>
    <button class="filter-tab" onclick="setFilter('cover')">커버만</button>
    <button class="filter-tab" onclick="setFilter('original')">원곡만</button>
  </div>

  <div class="loading" id="loading">
    <span class="loading-dot">●</span>
    <span class="loading-dot">●</span>
    <span class="loading-dot">●</span>
    <br><br>트렌드 수집 중
  </div>

  <div class="results" id="results"></div>

  <footer>YouTube Data API v3 · 음악 카테고리 급상승 기준 · 스냅샷 최대 30개</footer>

</div>

<script>
  const MUSIC_CATEGORY_ID = '10';
  const STORAGE_KEY = 'cover_trend_snapshots';
  const MAX_SNAPSHOTS = 30;

  const REGION_MAP = {
    KR: { flag: '🇰🇷', name: '한국' },
    JP: { flag: '🇯🇵', name: '일본' },
    TW: { flag: '🇹🇼', name: '대만' },
    HK: { flag: '🇭🇰', name: '홍콩' },
    US: { flag: '🇺🇸', name: '미국' },
    GB: { flag: '🇬🇧', name: '영국' },
  };

  let currentFilter = 'all';
  let currentData = null;
  let currentTs = null;
  let currentIsHistory = false;

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.filter-tab')[['all','cover','original'].indexOf(filter)]?.classList.add('active');
    if (currentData) renderResults(currentData, currentTs, currentIsHistory);
  }

  function isCoverVideo(item) {
    const title = (item.snippet?.title || '').toLowerCase();
    const coverKeywords = ['cover', '커버', 'covers', 'covering', 'covered'];
    return coverKeywords.some(k => title.includes(k));
  }

  function saveKey() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) return;
    localStorage.setItem('yt_api_key', key);
    const btn = document.getElementById('saveBtn');
    btn.textContent = '저장됨';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = '저장'; btn.classList.remove('saved'); }, 2000);
  }

  window.onload = () => {
    const saved = localStorage.getItem('yt_api_key');
    if (saved) document.getElementById('apiKey').value = saved;
    renderSnapshotChips();
  };

  function toggleRegion(btn) { btn.classList.toggle('active'); }

  function getActiveRegions() {
    return [...document.querySelectorAll('.region-btn.active')].map(b => ({
      code: b.dataset.code, flag: b.dataset.flag, name: b.dataset.name
    }));
  }

  function getSnapshots() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }

  function saveSnapshot(data) {
    let snapshots = getSnapshots();
    const ts = Date.now();
    const dateStr = new Date(ts).toLocaleDateString('ko-KR', {
      month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    snapshots.unshift({ ts, dateStr, data });
    if (snapshots.length > MAX_SNAPSHOTS) snapshots = snapshots.slice(0, MAX_SNAPSHOTS);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshots));
    renderSnapshotChips();
    return ts;
  }

  function clearHistory() {
    if (!confirm('모든 스냅샷을 삭제할까요?')) return;
    localStorage.removeItem(STORAGE_KEY);
    renderSnapshotChips();
    document.getElementById('results').classList.remove('active');
    document.getElementById('results').innerHTML = '';
  }

  function renderSnapshotChips() {
    const snapshots = getSnapshots();
    const list = document.getElementById('snapshotList');
    if (!snapshots.length) {
      list.innerHTML = '<span class="no-history">아직 저장된 스냅샷이 없습니다</span>';
      return;
    }
    list.innerHTML = snapshots.map((s, i) =>
      `<span class="snapshot-chip" onclick="loadSnapshot(${i})">${s.dateStr}</span>`
    ).join('');
  }

  function loadSnapshot(idx) {
    const snapshots = getSnapshots();
    if (!snapshots[idx]) return;
    document.querySelectorAll('.snapshot-chip').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.snapshot-chip')[idx]?.classList.add('active');
    renderResults(snapshots[idx].data, snapshots[idx].ts, true);
  }

  function getCoverScore(item) {
    const title = (item.snippet?.title || '').toLowerCase();
    let score = 0;
    if (title.includes('cover') || title.includes('커버')) score += 3;
    if (title.includes('acoustic') || title.includes('어쿠스틱')) score += 2;
    if (title.includes('official mv') || title.includes('official video')) score -= 1;
    if (title.includes('live')) score += 1;
    if (title.includes('lyrics')) score += 1;
    return Math.max(0, Math.min(5, score + 3));
  }

  function getCoverLabel(score) {
    if (score >= 5) return '커버 최적';
    if (score >= 4) return '커버 추천';
    if (score >= 3) return '커버 가능';
    return '참고용';
  }

  function getStreak(videoId, regionCode, currentTs) {
    const snapshots = getSnapshots();
    if (!snapshots.length) return 0;
    let streak = 0;
    const oneDayMs = 86400000;
    for (const snap of snapshots) {
      if (snap.ts >= currentTs) continue;
      if ((currentTs - snap.ts) > 90 * oneDayMs) break;
      const regionData = snap.data?.find(d => d.regionCode === regionCode);
      if (!regionData) continue;
      if (regionData.items?.some(item => item.id === videoId)) streak++;
      else break;
    }
    return streak;
  }

  function renderResults(regionDataArr, ts, isHistory) {
    currentData = regionDataArr;
    currentTs = ts;
    currentIsHistory = isHistory;

    document.getElementById('filterTabs').style.display = 'flex';

    const results = document.getElementById('results');
    const dateStr = new Date(ts).toLocaleString('ko-KR');
    let html = `<div class="results-meta">${isHistory ? '📁 히스토리' : '🔴 최신'} · ${dateStr} 기준</div>`;

    for (const { regionCode, items } of regionDataArr) {
      if (!items?.length) continue;
      const region = REGION_MAP[regionCode] || { flag: '🌐', name: regionCode };

      let filtered = items;
      if (currentFilter === 'cover') filtered = items.filter(isCoverVideo);
      else if (currentFilter === 'original') filtered = items.filter(item => !isCoverVideo(item));

      if (!filtered.length) {
        html += `
          <div class="region-result">
            <div class="region-header">
              <span class="region-flag">${region.flag}</span>
              <span class="region-name">${region.name}</span>
            </div>
            <div class="empty-filter">해당 필터에 맞는 항목이 없습니다</div>
          </div>`;
        continue;
      }

      const songs = filtered.map((item, i) => {
        const title = item.snippet?.title || '';
        const channel = item.snippet?.channelTitle || '';
        const score = getCoverScore(item);
        const label = getCoverLabel(score);
        const isCover = isCoverVideo(item);
        const streak = getStreak(item.id, regionCode, ts);
        const delay = i * 0.05;

        const streakHtml = streak >= 2
          ? `<span class="streak-badge">🔥 ${streak}일째</span>`
          : streak === 1 ? `<span class="streak-badge">📈 어제도</span>` : '';

        return `
          <li class="song-item" style="animation-delay:${delay}s">
            <span class="song-rank">${String(i+1).padStart(2,'0')}</span>
            <div class="song-info">
              <div class="song-title">${title}</div>
              <div class="song-channel">${channel}</div>
              <div class="song-tags">
                <span class="tag tag-music">음악</span>
                ${isCover ? '<span class="tag tag-cover">커버</span>' : ''}
                <span class="tag tag-trending">급상승</span>
                ${streak >= 3 ? '<span class="tag tag-hot">HOT</span>' : ''}
              </div>
            </div>
            <div class="song-right">
              <span class="cover-score">${label}</span>
              ${streakHtml}
            </div>
          </li>`;
      }).join('');

      html += `
        <div class="region-result">
          <div class="region-header">
            <span class="region-flag">${region.flag}</span>
            <span class="region-name">${region.name}</span>
          </div>
          <ul class="song-list">${songs}</ul>
        </div>`;
    }

    results.innerHTML = html;
    results.classList.add('active');
  }

  async function fetchRegion(apiKey, regionCode) {
    const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=${regionCode}&videoCategoryId=${MUSIC_CATEGORY_ID}&maxResults=15&key=${apiKey}`;
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `API 오류 (${res.status})`);
    }
    const json = await res.json();
    return { regionCode, items: json.items || [] };
  }

  async function fetchTrends() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) { showError('API 키를 입력해주세요.'); return; }

    const regions = getActiveRegions();
    if (!regions.length) { showError('지역을 하나 이상 선택해주세요.'); return; }

    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.classList.remove('active');
    results.classList.remove('active');
    results.innerHTML = '';
    loading.classList.add('active');
    document.querySelectorAll('.snapshot-chip').forEach(c => c.classList.remove('active'));

    try {
      const allResults = await Promise.all(regions.map(r => fetchRegion(apiKey, r.code)));
      const ts = saveSnapshot(allResults);
      renderResults(allResults, ts, false);
    } catch (err) {
      showError(`오류: ${err.message}\n\nAPI 키가 올바른지, YouTube Data API v3가 활성화되어 있는지 확인해주세요.`);
    } finally {
      loading.classList.remove('active');
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('active');
  }
</script>

</body>
</html>
